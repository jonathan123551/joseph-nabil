# ============================================================================
# nginx — production Laravel front-end for the elabeed-tickets app
# ============================================================================
# This file REPLACES /etc/nginx/nginx.conf inside the Railway container
# (see Dockerfile). nginx fronts php-fpm over TCP at 127.0.0.1:9000, and
# both are launched by supervisord (see supervisord.conf).
#
# Why this exists: production previously ran `php artisan serve` /
# `php -S` (PHP's built-in single-threaded dev server), which queued
# every concurrent request linearly behind the previous one. nginx +
# php-fpm gives us a real worker pool, plus three free wins layered on
# top: gzip on all text responses, long-lived Cache-Control on static
# assets, and a sane fastcgi pipeline.
# ============================================================================

# Auto-load dynamic modules dropped into /etc/nginx/modules-enabled/ by the
# Debian nginx package (and by the libnginx-mod-http-brotli-{filter,static}
# packages added in the Dockerfile). This must live in the main context
# above `events` — nginx rejects `load_module` anywhere below it. We let
# the OS package decide which modules to enable rather than hard-coding
# `load_module` paths here, so a future Debian version that renames the
# .so files doesn't break our deploy.
include /etc/nginx/modules-enabled/*.conf;

# Run workers as www-data — the user that already exists in the php:8.2-fpm
# (Debian) base image and that php-fpm itself runs as. The Debian nginx
# package does NOT create an `nginx` user, so the upstream default
# (`user nginx;`) makes nginx exit on startup with
# `getpwnam("nginx") failed`, supervisord burns its retry budget, and
# Railway's edge serves 502. Matching the php-fpm user also means the
# storage/ + bootstrap/cache chowns in the Dockerfile cover both processes.
user  www-data;
worker_processes  auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections  1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Compact access log; turn off for static assets in the server block.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # ------------------------------------------------------------------
    # Compression — gzip (every browser) + brotli (modern browsers)
    # ------------------------------------------------------------------
    # gzip on text-ish content types. Browsers automatically request this
    # via Accept-Encoding; turning it on is the single largest
    # bytes-on-the-wire win for HTML/CSS/JS/JSON responses. Empirically
    # measured: the elabeed homepage drops from ~605 KB to ~80 KB.
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     5;
    gzip_min_length     1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/manifest+json
        application/wasm
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # Brotli layered on top of gzip. Browsers that send
    # `Accept-Encoding: br` (every modern browser) get brotli;
    # everyone else gets gzip from the block above. Typical extra
    # savings on the elabeed homepage: ~15–20% off the already-gzipped
    # HTML/CSS, and the difference grows on JSON API responses.
    # `brotli_static on` also lets us serve a pre-built `foo.br` next
    # to `foo` if one ever exists — cheap to leave on, no-op today.
    brotli              on;
    brotli_static       on;
    brotli_comp_level   5;
    brotli_min_length   1024;
    brotli_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/manifest+json
        application/wasm
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ------------------------------------------------------------------
    # Auto-WebP serving
    # ------------------------------------------------------------------
    # Browsers that support WebP advertise it in their Accept header
    # (`Accept: ... image/webp ...`). When they do, we transparently
    # serve `foo.png.webp` if it exists; otherwise we fall back to
    # `foo.png`. The `.webp` siblings are pre-generated at Docker build
    # time (see the WebP pre-generation step in the Dockerfile) so this
    # is a pure-filesystem rewrite — no per-request image processing
    # cost. Browsers that don't support WebP (old Safari, IE) silently
    # get the original — their Accept header doesn't match this map.
    #
    # The `Vary: Accept` response header in the image location blocks
    # below tells intermediate caches that the response varies on the
    # Accept request header, so a CDN doesn't hand a WebP back to a
    # non-WebP browser.
    map $http_accept $webp_suffix {
        default     "";
        "~*image/webp" ".webp";
    }

    server {
        listen      0.0.0.0:8080 default_server;
        server_name _;
        root        /app/public;

        index index.php index.html;

        # 🔥 keep the larger body limit so admin poster / template uploads
        # don't trip 413 (matches php.ini's post_max_size headroom).
        client_max_body_size 30M;

        # Reasonable timeouts for long admin actions (image composition,
        # Cloudinary upload, WhatsApp Graph API). php-fpm has its own
        # request_terminate_timeout; nginx just needs to not cut the
        # response short.
        proxy_read_timeout   120s;
        fastcgi_read_timeout 120s;

        # --------------------------------------------------------------
        # Static assets — long-lived immutable cache
        # --------------------------------------------------------------
        # Files in these directories are not user-generated and don't
        # change at the same URL (images / favicons / brand art / the
        # Tailwind build output). We mark them `immutable` so browsers
        # re-validate AT MOST once a year (in practice, ~never until
        # they're evicted from disk cache).
        #
        # `try_files $uri =404` keeps us from leaking PHP behind a
        # typo'd asset path.
        #
        # Cache-Control note: the previous version of this file used both
        # `expires 1y;` and `add_header Cache-Control "...";`. nginx
        # emits both, which results in two `Cache-Control` headers on
        # the wire (`max-age=31536000` from `expires`, plus the explicit
        # one). Browsers tolerate it but it's noisy; we now keep only
        # the explicit `add_header` line so each response carries
        # exactly one Cache-Control header.

        # Tailwind build output (CSS / JS bundle).
        # No WebP rewrite — nothing in /build/ is an image.
        location ~* ^/build/ {
            try_files $uri =404;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Brand assets + photo library. Same long-lived immutable cache,
        # plus the Accept-aware WebP rewrite: browsers that send
        # `Accept: image/webp` transparently get `foo.png.webp` (if it
        # exists on disk); everyone else falls through to `foo.png`.
        # `Vary: Accept` keeps intermediate caches from cross-pollinating
        # the two variants.
        location ~* ^/(images|brand)/ {
            try_files $uri$webp_suffix $uri =404;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary Accept;
        }

        # Top-level favicons / robots — same long cache, slightly
        # different path shape so they get their own block. We don't
        # apply the WebP rewrite here because browsers and the OS shell
        # both expect a literal .ico / .png at these well-known URLs.
        location ~* ^/(favicon\.ico|robots\.txt)$ {
            try_files $uri =404;
            access_log off;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Catch-all for other static extensions served from /public
        # (e.g. anything dropped into public/ in the future). Comes
        # after the path-shape blocks above so /images, /brand, /build
        # never end up here.
        location ~* \.(?:css|js|mjs|svg|woff|woff2|ttf|otf|eot|jpg|jpeg|png|gif|webp|avif|ico|webmanifest)$ {
            try_files $uri =404;
            access_log off;
            add_header Cache-Control "public, max-age=2592000";
        }

        # --------------------------------------------------------------
        # Laravel front controller
        # --------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # --------------------------------------------------------------
        # PHP-FPM — replaces the previous `php artisan serve` setup,
        # which was single-threaded and queued every concurrent request
        # linearly. php-fpm is started by supervisord and listens on
        # 127.0.0.1:9000.
        # --------------------------------------------------------------
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO       $fastcgi_path_info;
            fastcgi_buffers      16 16k;
            fastcgi_buffer_size  32k;
        }

        # Hide dotfiles (.env, .git, .htaccess, …) just in case a future
        # deploy ever lands them in /public.
        location ~ /\.(?!well-known) {
            deny all;
        }
    }
}
