; PHP runtime limits for Railway / any buildpack-based deploy.
; The Procfile launches `php -c php.ini -S 0.0.0.0:$PORT -t public`,
; which makes PHP load THIS file as its sole ini source.
;
; Keep upload_max_filesize <= post_max_size, and post_max_size with a bit
; of headroom over the largest expected file so multipart overhead fits.

upload_max_filesize = 25M
post_max_size       = 30M
memory_limit        = 256M
max_execution_time  = 120
max_input_time      = 120
