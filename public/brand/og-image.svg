<?xml version="1.0" encoding="UTF-8"?>
<!--
  JN BRAND · OG / social card  (1200x630)
  ====================================================
  Single dark cinematic frame with the JN monogram centered above a
  PREMIUM TICKETS wordmark. JN paths are inlined at user-space scale so
  the userSpaceOnUse gradient coordinates align with the strokes.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="JN — Premium Tickets">
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0d1020"/>
      <stop offset="0.5" stop-color="#080a14"/>
      <stop offset="1"   stop-color="#15102a"/>
    </linearGradient>
    <radialGradient id="ogGlow" cx="0.5" cy="0.55" r="0.55">
      <stop offset="0"   stop-color="rgba(199,142,235,0.22)"/>
      <stop offset="0.55" stop-color="rgba(58,182,201,0.10)"/>
      <stop offset="1"   stop-color="rgba(8,10,20,0)"/>
    </radialGradient>
    <linearGradient id="ogJnGrad" x1="500" y1="180" x2="730" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#3cb6c9"/>
      <stop offset="0.28" stop-color="#e8c476"/>
      <stop offset="0.58" stop-color="#d4a64e"/>
      <stop offset="0.85" stop-color="#a566c4"/>
      <stop offset="1"    stop-color="#7d4ba8"/>
    </linearGradient>
    <linearGradient id="ogText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#e8c476"/>
      <stop offset="0.5" stop-color="#f1e9d2"/>
      <stop offset="1"   stop-color="#a566c4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#ogGlow)"/>

  <line x1="60" y1="60" x2="240" y2="60" stroke="url(#ogJnGrad)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="960" y1="570" x2="1140" y2="570" stroke="url(#ogJnGrad)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

  <!-- JN monogram inlined directly in user space. Geometry mirrors
       jn-monogram.svg but scaled into screen coords (scale 5,
       translate 440 110): each 64-unit step = 5px, so:
         12,14  -> 500, 180     58,50 -> 730, 360
       Stroke width 6.5 * 5 = 32.5 -->
  <g stroke="url(#ogJnGrad)" fill="none" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <!-- J -->
    <path d="M 500 180 H 570"/>
    <path d="M 550 180 V 300 C 550 347.5 520 370 495 355 C 475 342.5 480 315 505 317.5"/>
    <!-- N -->
    <path d="M 580 180 H 640"/>
    <path d="M 675 180 H 730"/>
    <path d="M 605 180 V 360"/>
    <path d="M 700 180 V 360"/>
    <path d="M 605 180 L 700 360"/>
  </g>

  <g text-anchor="middle">
    <text x="600" y="475" fill="url(#ogText)"
          font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="56" letter-spacing="14">PREMIUM TICKETS</text>
    <text x="600" y="520" fill="rgba(241,233,210,0.55)"
          font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
          font-weight="500" font-size="18" letter-spacing="8">STAGE · CONTROL · CINEMATIC</text>
  </g>
</svg>
