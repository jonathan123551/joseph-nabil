<?xml version="1.0" encoding="UTF-8"?>
<!--
  JN MONOGRAM · primary brand mark (gradient, full)
  ====================================================
  64×64 viewBox: drop-in replacement for the legacy pentagon SVG so the
  existing .pt-brand-logo container CSS still applies untouched.
  Composition: an interlocked, slightly italic "J" + "N" carrying
  calligraphic serifs on the strokes and a counter-clockwise descender
  curl on the J. Distilled from the painted source so the silhouette
  holds at favicon size.
  Stroke geometry only (no separate decorative fills) so every visual
  element scales together. linejoin=round + linecap=round gives the
  ink-stroke feel from the source without anti-alias artifacts.
  Gradient stops mirror the source palette: teal → gold (warm core) →
  violet. Same gradient reads on both dark and light surfaces because
  no stop is pure white or pure black.
  For dark/light theme inheritance, see jn-monogram-mono.svg, which
  drops the gradient and uses currentColor instead.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="JN">
  <defs>
    <linearGradient id="jnGrad" x1="6" y1="8" x2="58" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#3cb6c9"/>
      <stop offset="0.25" stop-color="#e8c476"/>
      <stop offset="0.55" stop-color="#d4a64e"/>
      <stop offset="0.82" stop-color="#a566c4"/>
      <stop offset="1"    stop-color="#7d4ba8"/>
    </linearGradient>
    <!-- Optional themed gradient overlays (kept as defs only) -->
    <linearGradient id="jnPlatePalette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13182a"/>
      <stop offset="1" stop-color="#080a14"/>
    </linearGradient>
  </defs>

  <g stroke="url(#jnGrad)" fill="none" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- J: top serif crossbar + vertical stem + counter-clockwise descender curl -->
    <path d="M 12 14 H 26"/>
    <path d="M 22 14 V 38 C 22 47.5 16 52 11 49 C 7 46.5 8 41 13 41.5"/>

    <!-- N: top serifs + left stem + diagonal + right stem -->
    <path d="M 28 14 H 40"/>
    <path d="M 47 14 H 58"/>
    <path d="M 33 14 V 50"/>
    <path d="M 52 14 V 50"/>
    <path d="M 33 14 L 52 50"/>
  </g>
</svg>
