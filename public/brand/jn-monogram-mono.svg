<?xml version="1.0" encoding="UTF-8"?>
<!--
  JN MONOGRAM · mono (currentColor)
  ====================================================
  Theme-aware variant of jn-monogram.svg: drops the gradient and uses
  currentColor instead so the mark inherits its color from the
  surrounding CSS context. Drop in via <img src="..."> styled with
  color: var(prism-text) (or any color) and the strokes update.
  Same geometry / viewBox / stroke widths as jn-monogram.svg, the two
  are visually identical except for the fill.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="JN">
  <g stroke="currentColor" fill="none" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- J: top serif crossbar + vertical stem + counter-clockwise descender curl -->
    <path d="M 12 14 H 26"/>
    <path d="M 22 14 V 38 C 22 47.5 16 52 11 49 C 7 46.5 8 41 13 41.5"/>

    <!-- N: top serifs + left stem + diagonal + right stem -->
    <path d="M 28 14 H 40"/>
    <path d="M 47 14 H 58"/>
    <path d="M 33 14 V 50"/>
    <path d="M 52 14 V 50"/>
    <path d="M 33 14 L 52 50"/>
  </g>
</svg>
